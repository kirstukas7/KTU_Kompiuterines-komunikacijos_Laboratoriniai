services:
  db:
    image: mysql:latest
    container_name: mysql
    restart: always
    networks:
      - traefik
    ports:
      - "3306:3306/tcp"
    env_file:
      - db.env
    volumes:
      - /etc/docker/volumes/kk-lab/mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    depends_on:
      - db
    networks:
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.http.routers.phpmyadmin.rule: Host(`${web_url}`)
      traefik.http.routers.phpmyadmin.entrypoints: websecure
    env_file:
      - php.env

networks:
  traefik:
    external: true
